name: CI (E2E)

on:
  push:
    branches: ["main"]
  pull_request:
    types: ["opened", "synchronize"]

jobs:
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    env:
      POSTGRESQL_URL: postgres://user:password@localhost:5432/testdb
    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testdb
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: latest
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@core-internal/e2e-tests run pw:setup
      - run: pnpm --filter=@core-internal/e2e-tests run pw:test
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: blob-report
          path: internals/e2e-tests/blob-report
          retention-days: 5